<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shiyam's Portfolio</title>
  <script type="text/javascript">
    // SPA GitHub Pages Redirect
    var pathSegmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
